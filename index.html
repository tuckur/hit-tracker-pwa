function getExercises() {

}

function getExerciseName(id) {
  const ex = getExercises().find(e => e.id === id);
  return ex ? ex.name : id;
}

  return getExercises().find(e => e.id === id);
}

  }
}

// ============================================================
// PROGRESSIVE OVERLOAD ENGINE
// ============================================================

function getLastWorkingSet(exerciseId) {
  const sessions = getSessions().sort((a, b) => new Date(b.date) - new Date(a.date));
  for (const s of sessions) {
    const ex = s.exercises.find(e => e.exerciseId === exerciseId && !e.skipped);
    if (ex) {
      const ws = ex.sets.filter(s => s.type === 'working');
      if (ws.length > 0) {
        return { ...ws[ws.length - 1], date: s.date, sessionId: s.id };
      }
    }
  }
  return null;
}

function getLastTwoWorkingSets(exerciseId) {
  const sessions = getSessions().sort((a, b) => new Date(b.date) - new Date(a.date));
  const results = [];
  for (const s of sessions) {
    const ex = s.exercises.find(e => e.exerciseId === exerciseId && !e.skipped);
    if (ex) {
      const ws = ex.sets.filter(s => s.type === 'working');
      if (ws.length > 0) {
        results.push({ ...ws[ws.length - 1], date: s.date });
      }
    }
    if (results.length >= 2) break;
  }
  return results;
}

function getLastWarmups(exerciseId) {
  const sessions = getSessions().sort((a, b) => new Date(b.date) - new Date(a.date));
  for (const s of sessions) {
    const ex = s.exercises.find(e => e.exerciseId === exerciseId && !e.skipped);
    if (ex) {
      const wu = ex.sets.filter(s => s.type === 'warmup');
      if (wu.length > 0) return wu;
    }
  }
  return [];
}

function getSuggestion(exerciseId, repRange) {
  const last = getLastWorkingSet(exerciseId);
  const exercise = getExerciseById(exerciseId);
  const isBW = exercise && (exercise.equipment === 'Bodyweight' || exercise.equipment === 'Band');

  if (!last) {
    return { weight: isBW ? 0 : 20, reps: repRange[0], reasoning: 'First time — start conservative', type: 'new' };
  }

  const [minRep, maxRep] = repRange;
  const lastTwo = getLastTwoWorkingSets(exerciseId);

  // Check stalled
  if (lastTwo.length >= 2) {
    const sameWeight = lastTwo[0].weight === lastTwo[1].weight || (lastTwo[0].bodyweight && lastTwo[1].bodyweight);
    const sameOrFewerReps = lastTwo[0].reps <= lastTwo[1].reps;
    if (sameWeight && sameOrFewerReps) {
      return {
        weight: last.weight,
        reps: last.reps + 1,
        reasoning: `Stalled at ${last.bodyweight ? 'BW' : last.weight + ' lbs'} × ${last.reps} — focus on form, slower negatives`,
        type: 'stalled',
        bodyweight: last.bodyweight,
      };
    }
  }

  // Hit top of range → increase weight
  if (last.reps >= maxRep) {
    if (isBW) {
      return {
        weight: last.weight,
        reps: last.reps + 1,
        reasoning: `Hit ${last.reps} reps — push for +1 rep`,
        type: 'progress',
        bodyweight: last.bodyweight,
      };
    }
    const newWeight = last.weight + 5;
    return {
      weight: newWeight,
      reps: minRep,
      reasoning: `Hit ${last.reps} reps — move up to ${newWeight} lbs`,
      type: 'increase',
    };
  }

  // In range → push for +1 rep
  return {
    weight: last.weight,
    reps: last.reps + 1,
    reasoning: `Did ${last.reps} reps last time — aim for ${last.reps + 1}`,
    type: 'progress',
    bodyweight: last.bodyweight,
  };
}

function isStalled(exerciseId) {
  const lastTwo = getLastTwoWorkingSets(exerciseId);
  if (lastTwo.length < 2) return false;
  const sameWeight = lastTwo[0].weight === lastTwo[1].weight || (lastTwo[0].bodyweight && lastTwo[1].bodyweight);
  const sameOrFewerReps = lastTwo[0].reps <= lastTwo[1].reps;
  return sameWeight && sameOrFewerReps;
}

function getPR(exerciseId) {
  const sessions = getSessions();
  let best = null;
  let bestDate = null;
  for (const s of sessions) {
    const ex = s.exercises.find(e => e.exerciseId === exerciseId && !e.skipped);
    if (!ex) continue;
    for (const set of ex.sets) {
      if (set.type !== 'working') continue;
      const vol = (set.bodyweight ? 1 : set.weight) * set.reps;
      if (!best || vol > best.volume) {
        best = { weight: set.weight, reps: set.reps, volume: vol, bodyweight: set.bodyweight };
        bestDate = s.date;
      }
    }
  }
  return best ? { ...best, date: bestDate } : null;
}

function getAllPRs() {
  const exercises = getExercises();
  const prs = [];
  for (const ex of exercises) {
    const pr = getPR(ex.id);
    if (pr) {
      prs.push({ exerciseId: ex.id, name: ex.name, ...pr });
    }
  }
  return prs.sort((a, b) => new Date(b.date) - new Date(a.date));
}

function getStalledExercises() {
  const plan = getPlan();
  const stalled = [];
  for (const day of plan) {
    for (const ex of day.exercises) {
      if (isStalled(ex.exerciseId)) {
        const lastTwo = getLastTwoWorkingSets(ex.exerciseId);
        stalled.push({
          exerciseId: ex.exerciseId,
          name: getExerciseName(ex.exerciseId),
          weight: lastTwo[0].weight,
          reps: lastTwo[0].reps,
          bodyweight: lastTwo[0].bodyweight,
          sessions: 2,
        });
      }
    }
  }
  // Deduplicate
  const seen = new Set();
  return stalled.filter(s => {
    if (seen.has(s.exerciseId)) return false;
    seen.add(s.exerciseId);
    return true;
  });
}

function getNextPlanDay() {
  const sessions = getSessions().sort((a, b) => new Date(b.date) - new Date(a.date));
  if (sessions.length === 0) return getPlan()[0];
  const lastDayId = sessions[0].planDayId;
  const plan = getPlan();
  const idx = plan.findIndex(d => d.id === lastDayId);
  return plan[(idx + 1) % plan.length];
}

function getWeekSessions() {
  const now = new Date();
  const startOfWeek = new Date(now);
  startOfWeek.setDate(now.getDate() - now.getDay());
  startOfWeek.setHours(0, 0, 0, 0);
  return getSessions().filter(s => new Date(s.date) >= startOfWeek);
}

function getWeekWorkingSets() {
  const weekSessions = getWeekSessions();
  let count = 0;
  for (const s of weekSessions) {
    for (const ex of s.exercises) {
      if (!ex.skipped) {
        count += ex.sets.filter(st => st.type === 'working').length;
      }
    }
  }
  return count;
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function formatWeight(set) {
  if (set.bodyweight || set.weight === 0) return 'BW';
  return set.weight + ' lbs';
}

let isDark = true;

  applyTheme();
  store.setItem(THEME_KEY, isDark ? 'dark' : 'light');
  router();
}

function applyTheme() {
  document.body.classList.toggle('light-mode', !isDark);
  document.getElementById('themeIcon').textContent = isDark ? '🌙' : '☀️';
  const toggle = document.getElementById('themeToggle');
  toggle.style.background = isDark ? '#141414' : '#e5e5e5';
  const header = document.getElementById('header');
  header.style.background = isDark ? 'rgba(10,10,10,0.92)' : 'rgba(245,245,245,0.92)';
  const nav = document.getElementById('bottomNav');
  nav.style.background = isDark ? 'rgba(10,10,10,0.92)' : 'rgba(245,245,245,0.92)';
  nav.style.borderColor = isDark ? '#222' : '#e5e5e5';
}

function initTheme() {
  const saved = store.getItem(THEME_KEY);
  if (saved) isDark = saved === 'dark';
  applyTheme();
}

// ROUTING
// ============================================================

function getRoute() {
  const hash = window.location.hash || '#/';
  return hash.substring(1);
}

function navigate(path) {
  window.location.hash = path;
}

function updateNav() {
  const route = getRoute();
  document.querySelectorAll('.nav-tab').forEach(tab => {
    const href = tab.getAttribute('href').substring(1);
    const isActive = (route === '/' && href === '/') ||
                     (route !== '/' && href !== '/' && route.startsWith(href));
    tab.style.color = isActive ? '#c42b2b' : (isDark ? '#888' : '#666');
  });
}

function router() {
  const route = getRoute();
  const main = document.getElementById('main');
  updateNav();

  if (route === '/' || route === '') {
    renderDashboard(main);
  } else if (route === '/workout') {
    renderWorkout(main);
  } else if (route === '/coach') {
    renderCoach(main);
  } else if (route === '/history') {
    renderHistory(main);
  } else if (route.startsWith('/history/')) {
    const id = route.split('/history/')[1];
    renderSessionDetail(main, id);
  } else if (route === '/plan') {
    renderPlan(main);
  } else {
    main.innerHTML = '<div class="page text-center py-20"><p class="text-muted">Page not found</p></div>';
  }
}

function toggleDayPreview(dayId) {
  const preview = document.getElementById(`preview-${dayId}`);
  if (preview) {
    preview.classList.toggle('hidden');
  }
}

function startWorkoutDay(dayId) {
  const plan = getPlan();
  const day = plan.find(d => d.id === dayId);
  if (!day) return;

  activeWorkout = {
    planDayId: day.id,
    planDayName: day.name,
    day: day.day,
    exercises: day.exercises.map(ex => ({
      ...ex,
      completed: false,
      sets: [],
      skipped: false,
    })),
    currentExerciseIndex: 0,
    startTime: Date.now(),
    notes: '',
  };

  workoutElapsed = 0;
  startWorkoutTimer();
  if (getRoute() === '/workout') {
    router();
  } else {
    navigate('/workout');
  }
}

function startWorkoutTimer() {
  if (workoutTimer) clearInterval(workoutTimer);
  workoutTimer = setInterval(() => {
    workoutElapsed = Math.floor((Date.now() - activeWorkout.startTime) / 1000);
    const timerEl = document.getElementById('workoutTimerDisplay');
    if (timerEl) {
      timerEl.textContent = formatTime(workoutElapsed);
    }
  }, 1000);
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function renderActiveWorkout(el) {
  const w = activeWorkout;
  const completed = w.exercises.filter(e => e.completed || e.skipped).length;
  const total = w.exercises.length;
  const progress = Math.round((completed / total) * 100);
  const current = w.exercises[w.currentExerciseIndex];
  const cardBg = isDark ? 'bg-[#141414] border-[#222]' : 'bg-white border-[#e5e5e5]';
  const textMain = isDark ? 'text-white' : 'text-[#1a1a1a]';
  const textMuted = isDark ? 'text-[#888]' : 'text-[#666]';
  const inputBg = isDark ? 'bg-[#1a1a1a] border-[#333] text-white' : 'bg-[#f0f0f0] border-[#ddd] text-[#1a1a1a]';

  if (!current || completed === total) {
    renderWorkoutSummary(el);
    return;
  }

  const sug = getSuggestion(current.exerciseId, current.repRange);
  const stalledFlag = isStalled(current.exerciseId);
  const pr = getPR(current.exerciseId);

  const planEx = current;

  // Auto-populate warmup suggestions

    if (lastWarmups.length > 0) {
      warmupSuggestions = lastWarmups.slice(0, planEx.warmupSets);
    } else {
      // Auto-generate at 60% and 80%
      const targetW = sug.weight;
      if (targetW > 0) {
        if (planEx.warmupSets >= 2) {
          warmupSuggestions.push({ weight: Math.round(targetW * 0.6 / 5) * 5, reps: 12 });
          warmupSuggestions.push({ weight: Math.round(targetW * 0.8 / 5) * 5, reps: 8 });
        } else {
          warmupSuggestions.push({ weight: Math.round(targetW * 0.7 / 5) * 5, reps: 10 });
        }
      }
    }
  }

  el.innerHTML = `
    <div class="page space-y-3 pt-1">
      <!-- Timer & Progress Header -->
      <div class="flex items-center justify-between">
        <div>
          <p class="text-xs font-display ${textMuted} uppercase tracking-wider">Day ${w.day}: ${w.planDayName}</p>
          <p id="workoutTimerDisplay" class="font-mono text-2xl font-bold text-crimson pulse-ring inline-block rounded-lg px-1">${formatTime(workoutElapsed)}</p>
        </div>
        <div class="text-right">
          <p class="text-xs ${textMuted}">${completed}/${total} exercises</p>
          <div class="w-24 h-2 ${isDark ? 'bg-[#222]' : 'bg-[#ddd]'} rounded-full mt-1 overflow-hidden">
            <div class="h-full bg-crimson rounded-full transition-all duration-300" style="width: ${progress}%"></div>
          </div>
        </div>
      </div>

      <!-- Current Exercise -->
      <div class="card-accent ${cardBg} border rounded-xl p-4">
        <div class="flex items-start justify-between mb-2">
          <div>
            <div class="flex items-center gap-2 flex-wrap">
              <h3 class="text-base font-bold ${textMain}">${getExerciseName(current.exerciseId)}</h3>
              ${stalledFlag ? '<span class="text-[9px] bg-yellow-600/20 text-yellow-500 px-1.5 py-0.5 rounded font-bold">STALLED</span>' : ''}
              ${pr ? '<span class="text-[9px] bg-crimson/20 text-crimson px-1.5 py-0.5 rounded font-bold">PR: ' + (pr.bodyweight ? 'BW' : pr.weight + '#') + '×' + pr.reps + '</span>' : ''}
            </div>
            <p class="text-xs ${textMuted} mt-0.5">Target: ${current.repRange[0]}-${current.repRange[1]} reps · ${current.warmupSets} WU / ${current.workingSets} WS</p>
          </div>
          <button onclick="skipExercise()" class="text-xs ${textMuted} px-2 py-1 rounded border ${isDark ? 'border-[#333]' : 'border-[#ddd]'} min-h-[32px]">Skip</button>
        </div>
        ${current.notes ? `<p class="text-[11px] ${textMuted} italic mb-3">${current.notes}</p>` : ''}

        <!-- Smart Target Card -->
        <div class="${isDark ? 'bg-crimson/10 border-crimson/20' : 'bg-crimson/5 border-crimson/20'} border rounded-lg p-3 mb-3">
          <div class="flex items-center gap-2 mb-1">
            <span class="text-xs">🎯</span>
            <span class="text-[10px] font-display font-bold text-crimson uppercase tracking-wider">Smart Target</span>
          </div>
          <p class="font-mono text-sm font-bold ${textMain}">${sug.bodyweight ? 'BW' : sug.weight + ' lbs'} × ${sug.reps} reps</p>
          <p class="text-[11px] ${textMuted} mt-0.5">${sug.reasoning}</p>
        </div>

        <!-- Warmup Sets -->
        ${planEx.warmupSets > 0 ? `
          <div class="mb-3">
            <p class="text-[10px] ${textMuted} uppercase tracking-wider font-display font-semibold mb-2">Warmup Sets</p>
            ${Array.from({ length: planEx.warmupSets }, (_, i) => {
              const ws = warmupSuggestions[i];
              return `
                <div class="flex items-center gap-2 mb-2">
                  <span class="text-[10px] ${textMuted} w-6 flex-shrink-0">W${i + 1}</span>
                  <input type="number" id="wu-weight-${i}" class="input-bg ${inputBg} border rounded-lg px-3 py-2 w-20 text-center font-mono text-sm" value="${ws ? ws.weight : ''}" placeholder="lbs">
                  <span class="text-xs ${textMuted}">×</span>
                  <input type="number" id="wu-reps-${i}" class="input-bg ${inputBg} border rounded-lg px-3 py-2 w-16 text-center font-mono text-sm" value="${ws ? ws.reps : ''}" placeholder="reps">
                </div>
              `;
            }).join('')}
          </div>
        ` : ''}

        <!-- Working Set -->
        <div class="mb-3">
          <p class="text-[10px] ${textMuted} uppercase tracking-wider font-display font-semibold mb-2">Working Set (to failure)</p>
          <div class="flex items-center gap-2">
            <span class="text-[10px] text-crimson font-bold w-6 flex-shrink-0">WS</span>
            <input type="number" id="ws-weight-0" class="input-bg ${inputBg} border rounded-lg px-3 py-2.5 w-20 text-center font-mono text-sm font-bold" value="${sug.bodyweight ? 0 : sug.weight}" placeholder="lbs">
            <span class="text-xs ${textMuted}">×</span>

          <div class="space-y-1.5">
            ${w.exercises.filter(e => e.completed || e.skipped).map(e => `
              <div class="card-accent ${cardBg} border rounded-lg p-2.5 flex items-center justify-between">
                <div class="flex items-center gap-2 min-w-0">
                  <span class="${e.skipped ? 'text-yellow-500' : 'text-green-500'} text-xs">${e.skipped ? '⏭️' : '✅'}</span>

                </div>
                ${!e.skipped && e.sets.length > 0 ? `
                  <span class="font-mono text-[11px] text-crimson font-semibold flex-shrink-0 ml-2">

        </div>
      ` : ''}

      <!-- Session Notes -->
      <div class="card-accent ${cardBg} border rounded-xl p-3">
        <p class="text-[10px] ${textMuted} uppercase tracking-wider font-display font-semibold mb-1.5">Session Notes</p>
        <textarea id="sessionNotes" class="input-bg ${inputBg} border rounded-lg w-full p-2.5 text-sm resize-none" rows="2" placeholder="How are you feeling?">${w.notes || ''}</textarea>
      </div>

      <!-- Cancel -->
      <button onclick="cancelWorkout()" class="w-full py-2 text-xs ${textMuted} text-center">Cancel Workout</button>
    </div>
  `;
}

function logExercise() {
  const current = activeWorkout.exercises[activeWorkout.currentExerciseIndex];
  const planEx = current;
  const sets = [];

  // Gather warmup sets
  for (let i = 0; i < planEx.warmupSets; i++) {
    const wEl = document.getElementById(`wu-weight-${i}`);
    const rEl = document.getElementById(`wu-reps-${i}`);
    if (wEl && rEl && (wEl.value || rEl.value)) {
      sets.push({ type: 'warmup', weight: parseFloat(wEl.value) || 0, reps: parseInt(rEl.value) || 0 });
    }
  }

  // Gather working set
  const wsW = document.getElementById('ws-weight-0');
  const wsR = document.getElementById('ws-reps-0');
  if (wsW && wsR) {
    const weight = parseFloat(wsW.value) || 0;
    const reps = parseInt(wsR.value) || 0;
    if (reps > 0) {
      sets.push({
        type: 'working',
        weight: weight,
        reps: reps,
        toFailure: true,
        bodyweight: weight === 0,
      });
    }
  }

  // Save notes
  const notesEl = document.getElementById('sessionNotes');
  if (notesEl) activeWorkout.notes = notesEl.value;

  current.sets = sets;
  current.completed = true;

  // Move to next
  const nextIdx = activeWorkout.exercises.findIndex((e, i) => i > activeWorkout.currentExerciseIndex && !e.completed && !e.skipped);
  if (nextIdx >= 0) {
    activeWorkout.currentExerciseIndex = nextIdx;
    // Show rest timer
    showRestTimer(current.rest || 90);
  } else {
    activeWorkout.currentExerciseIndex = activeWorkout.exercises.length;
  }

  renderActiveWorkout(document.getElementById('main'));
}

function skipExercise() {
  const current = activeWorkout.exercises[activeWorkout.currentExerciseIndex];
  current.skipped = true;
  current.sets = [];

  const nextIdx = activeWorkout.exercises.findIndex((e, i) => i > activeWorkout.currentExerciseIndex && !e.completed && !e.skipped);
  if (nextIdx >= 0) {
    activeWorkout.currentExerciseIndex = nextIdx;
  } else {
    activeWorkout.currentExerciseIndex = activeWorkout.exercises.length;
  }

  renderActiveWorkout(document.getElementById('main'));
}

function showRestTimer(seconds) {
  restSeconds = seconds;
  const overlay = document.getElementById('restOverlay');
  overlay.classList.remove('hidden');
  overlay.style.display = 'flex';

  updateRestDisplay();

  restTimer = setInterval(() => {
    restSeconds--;
    if (restSeconds <= 0) {
      skipRest();
      return;
    }
    updateRestDisplay();
  }, 1000);
}

function updateRestDisplay() {
  const el = document.getElementById('restTime');
  if (el) {
    const m = Math.floor(restSeconds / 60);
    const s = restSeconds % 60;
    el.textContent = `${m}:${s.toString().padStart(2, '0')}`;
  }
}

function skipRest() {
  if (restTimer) clearInterval(restTimer);
  restTimer = null;
  const overlay = document.getElementById('restOverlay');
  overlay.classList.add('hidden');
  overlay.style.display = 'none';
}

function cancelWorkout() {
  if (!confirm('Cancel this workout? All logged data will be lost.')) return;
  if (workoutTimer) clearInterval(workoutTimer);
  workoutTimer = null;
  activeWorkout = null;
  navigate('/workout');
}

function renderWorkoutSummary(el) {
  const w = activeWorkout;
  const duration = Math.round((Date.now() - w.startTime) / 60000);
  const wSets = w.exercises.filter(e => e.completed).reduce((n, e) => n + e.sets.filter(s => s.type === 'working').length, 0);
  const cardBg = isDark ? 'bg-[#141414] border-[#222]' : 'bg-white border-[#e5e5e5]';
  const textMain = isDark ? 'text-white' : 'text-[#1a1a1a]';
  const textMuted = isDark ? 'text-[#888]' : 'text-[#666]';

  el.innerHTML = `
    <div class="page space-y-4 pt-2 text-center">
      <div class="py-4">
        <p class="text-4xl mb-2">💪</p>
        <h2 class="font-display text-xl font-bold ${textMain} uppercase tracking-wide">Workout Complete!</h2>
        <p class="text-sm ${textMuted} mt-1">${w.planDayName} · ${duration} min · ${wSets} working sets</p>
      </div>

      <div class="space-y-2 text-left">
        ${w.exercises.map(e => `
          <div class="card-accent ${cardBg} border rounded-xl p-3">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-2 min-w-0">
                <span class="${e.skipped ? 'text-yellow-500' : 'text-green-500'} text-xs">${e.skipped ? '⏭️' : '✅'}</span>
                <span class="text-sm font-medium ${textMain} truncate">${getExerciseName(e.exerciseId)}</span>
              </div>
              ${!e.skipped ? `
                <span class="font-mono text-xs text-crimson font-semibold flex-shrink-0 ml-2">
                  ${e.sets.filter(s => s.type === 'working').map(s => `${formatWeight(s)} × ${s.reps}`).join(', ') || '—'}
                </span>
              ` : '<span class="text-xs text-yellow-500 flex-shrink-0">Skipped</span>'}
            </div>
          </div>
        `).join('')}
      </div>

      <button onclick="saveWorkout()" class="w-full py-3.5 bg-crimson text-white font-display font-bold rounded-xl text-sm min-h-[48px] uppercase tracking-wider">
        Save Workout
      </button>
      <button onclick="discardWorkout()" class="w-full py-2 text-xs ${textMuted}">Discard</button>
    </div>
  `;
}

function saveWorkout() {
  const w = activeWorkout;
  const duration = Math.round((Date.now() - w.startTime) / 60000);
  const today = new Date().toISOString().split('T')[0];

  const session = {
    id: 's' + Date.now(),
    planDayId: w.planDayId,
    planDayName: w.planDayName,
    date: today,
    duration: duration || 1,
    notes: w.notes || '',
    exercises: w.exercises.map(e => ({
      exerciseId: e.exerciseId,
      skipped: e.skipped || false,
      sets: e.sets || [],
    })),
  };

  const sessions = getSessions();
  sessions.push(session);
  saveSessions(sessions);

  if (workoutTimer) clearInterval(workoutTimer);
  workoutTimer = null;
  activeWorkout = null;

  navigate('/history/' + session.id);
}

function discardWorkout() {
  if (!confirm('Discard this workout?')) return;
  if (workoutTimer) clearInterval(workoutTimer);
  workoutTimer = null;
  activeWorkout = null;
  navigate('/');
}

      <div class="flex justify-end">
        <div class="chat-user bg-crimson px-3 py-2.5 max-w-[85%]">
          <p class="text-[13px] text-white leading-relaxed">${msg.text}</p>
        </div>
      </div>
    `;
  }
}

function coachPrompt(key) {
  const labels = {
    today: "What should I do today?",
    stall: "How do I break through a stall?",
    swap: "Swap out incline curls",
    progress: "Review my recent progress",
    techniques: "Tell me about Dorian's intensity techniques",
  };

  chatMessages.push({ role: 'user', text: labels[key] });

  let response = '';

  if (key === 'today') {
    const next = getNextPlanDay();
    const lines = [`Today is Day ${next.day}: ${next.name}. Here's your targets:\n`];
    for (const ex of next.exercises) {
      const sug = getSuggestion(ex.exerciseId, ex.repRange);
      const st = isStalled(ex.exerciseId) ? ' ⚠️ STALLED' : '';
      const sugW = (sug.bodyweight || sug.weight === 0) ? 'BW' : sug.weight + ' lbs';
      lines.push(`• ${getExerciseName(ex.exerciseId)}: ${sugW} × ${sug.reps} reps${st}`);
    }
    lines.push(`\nRemember: one working set to absolute failure. Control the negative. No ego lifting.`);
    response = lines.join('\n');
  } else if (key === 'stall') {
    const stalled = getStalledExercises();
    if (stalled.length === 0) {
      response = "Great news — none of your exercises are currently stalled! You're progressing across the board. Keep pushing for that extra rep each session.";
    } else {
      const lines = [`You have ${stalled.length} stalled exercise${stalled.length > 1 ? 's' : ''}:\n`];
      for (const s of stalled) {
        lines.push(`⚠️ ${s.name} — stuck at ${s.bodyweight ? 'BW' : s.weight + ' lbs'} × ${s.reps}`);
      }
      lines.push(`\nHIT strategies to break through:`);
      lines.push(`1. Forced reps: at failure, have a partner help you complete 1-2 more reps`);
      lines.push(`2. Negatives: lower the weight slowly (4-5s) on the eccentric portion`);
      lines.push(`3. Burns: short partial reps at the end of a set to push past failure`);
      lines.push(`4. Drop sets: immediately reduce weight by 20-30% and continue repping`);
      lines.push(`5. Pre-exhaust: isolation exercise before compound to pre-fatigue the target muscle`);
      lines.push(`6. Swap the exercise for a variation (keeps the muscle guessing)`);
      response = lines.join('\n');
    }
  } else if (key === 'techniques') {
    response = `Dorian's Training Journal (1985-1990) documents these intensity techniques:\n\n💥 FORCED REPS\nAt failure, have a partner help you complete 1-2 more reps. The partner gives minimum assistance — you fight for every inch.\n\n⬇️ NEGATIVES\nLower the weight slowly (4-5 seconds) on the eccentric portion. This is half the rep most people throw away. Control it.\n\n🔥 BURNS\nShort partial reps at the end of a set. After you can't complete full reps, squeeze out 6-8 partial reps in the strongest range of motion.\n\n📉 DROP SETS\nImmediately reduce weight by 20-30% and continue repping until failure again. One drop is usually enough.\n\n🎯 PRE-EXHAUST\nDo an isolation exercise before the compound to pre-fatigue the target muscle. Example: flyes before bench press.\n\n🔄 INTENSITY CYCLING\nEvery 6-8 weeks, take a deload week at 50% intensity. Dorian noted when he "worked light due to sore joints" — respect recovery.\n\nThe journal shows Dorian trained 3 days/week (Mon-Wed-Fri), rotating muscle groups. Sessions at 2:30 PM. Brief, brutal, and intense.`;
  } else if (key === 'swap') {
    response = `For incline curls, I'd recommend swapping to one of these:\n\n1. Standing DB Curls — already in your plan, great for overall bicep development\n2. Concentration Curls — isolates the peak, easier on the shoulder joint\n\n⚠️ Given your shoulder cuff concerns, AVOID:\n• Heavy barbell curls with momentum\n• Behind-the-back cable curls\n• Any curl variation that puts the shoulder in extreme extension\n\nConcentration curls are your safest bet — seated, elbow braced on inner thigh, pure isolation. Start with 15-20 lbs for 8-12 reps.`;
  } else if (key === 'progress') {
    const sessions = getSessions().sort((a, b) => new Date(b.date) - new Date(a.date));
    const recent = sessions.slice(0, 5);
    const lines = [`Here's your last ${recent.length} sessions:\n`];
    for (const s of recent) {
      const wSets = s.exercises.reduce((n, e) => n + (e.skipped ? 0 : e.sets.filter(st => st.type === 'working').length), 0);
      lines.push(`📅 ${formatDate(s.date)} — ${s.planDayName} (${s.duration} min, ${wSets} sets)`);
    }

    // Check for recent PRs
    const prs = getAllPRs().slice(0, 3);
    if (prs.length > 0) {
      lines.push(`\n🏆 Recent PRs:`);
      for (const pr of prs) {
        lines.push(`• ${pr.name}: ${pr.bodyweight ? 'BW' : pr.weight + ' lbs'} × ${pr.reps} (${formatDate(pr.date)})`);
      }
    }

    const stalled = getStalledExercises();
    if (stalled.length > 0) {
      lines.push(`\n⚠️ ${stalled.length} exercise${stalled.length > 1 ? 's' : ''} stalled — address these next session.`);
    }

    lines.push(`\nOverall: solid consistency. Keep the intensity up and the workouts brief.`);
    response = lines.join('\n');
  }

  chatMessages.push({ role: 'bot', text: response });
  renderCoach(document.getElementById('main'));
}

function coachSend() {
  const input = document.getElementById('coachInput');
  const text = input.value.trim();
  if (!text) return;

  chatMessages.push({ role: 'user', text });

  // Keyword matching
  const lower = text.toLowerCase();
  let response = '';

  if (lower.includes('today') || lower.includes('next') || lower.includes('what should')) {
    coachPrompt('today');
    return;
  } else if (lower.includes('stall') || lower.includes('plateau') || lower.includes('stuck') || lower.includes('break through')) {
    coachPrompt('stall');
    return;
  } else if (lower.includes('swap') || lower.includes('replace') || lower.includes('incline curl') || lower.includes('alternative')) {
    coachPrompt('swap');
    return;
  } else if (lower.includes('progress') || lower.includes('review') || lower.includes('how am i') || lower.includes('recent')) {
    coachPrompt('progress');
    return;
  } else if (lower.includes('technique') || lower.includes('forced rep') || lower.includes('negative') || lower.includes('burn') || lower.includes('drop set') || lower.includes('pre-exhaust') || lower.includes('intensity cycl')) {
    coachPrompt('techniques');
    return;
  } else if (lower.includes('rest') || lower.includes('recovery') || lower.includes('deload')) {
    response = "In HIT, recovery is just as important as the training. Rest at least 48 hours between sessions hitting the same muscle group. Sleep 7-9 hours. Eat sufficient protein (0.8-1g per pound bodyweight). If you're not recovering, you won't grow — Dorian trained each body part once per week.\n\nFrom the journal: every 6-8 weeks, take a deload week at 50% intensity. Dorian noted when he 'worked light due to sore joints' — the smart move is to respect recovery, not push through injury.";
  } else if (lower.includes('diet') || lower.includes('protein') || lower.includes('eat') || lower.includes('nutrition')) {
    response = "For HIT training, aim for:\n• Protein: 0.8-1g per pound bodyweight\n• Eat in a slight surplus for muscle gain, deficit for fat loss\n• Pre-workout meal 1-2 hours before training\n• Post-workout: protein + carbs within 1 hour\n• Stay hydrated — at least 1 gallon of water daily";
  } else if (lower.includes('failure') || lower.includes('intensity')) {
    response = "Dorian's rule: the working set should be ABSOLUTE muscular failure. Not 'it hurts' failure — 'I literally cannot move this weight one more inch' failure. That's where the magic happens. If you're not failing, you're not training hard enough. One set of true failure beats 10 sets of going through the motions.";
  } else if (lower.includes('warm') || lower.includes('warmup')) {
    response = "Warmup protocol:\n1. First warmup: ~60% of working weight, 12 reps (NOT to failure)\n2. Second warmup: ~80% of working weight, 6-8 reps (NOT to failure)\n\nWarmups prepare the joint and muscle, they DON'T fatigue you. Save everything for the working set.";
  } else {
    response = "I can help with:\n• Training recommendations ('What should I do today?')\n• Breaking through plateaus ('How do I break a stall?')\n• Dorian's intensity techniques (forced reps, negatives, burns, drop sets)\n• Exercise swaps ('Swap incline curls')\n• Progress reviews ('Review my progress')\n• Recovery, nutrition, and HIT principles\n\nTry one of these topics or tap a quick prompt above!";
  }

  chatMessages.push({ role: 'bot', text: response });
  renderCoach(document.getElementById('main'));
}

function renderHistory(el) {
  const sessions = getSessions().sort((a, b) => new Date(b.date) - new Date(a.date));
  const cardBg = isDark ? 'bg-[#141414] border-[#222]' : 'bg-white border-[#e5e5e5]';
  const textMain = isDark ? 'text-white' : 'text-[#1a1a1a]';
  const textMuted = isDark ? 'text-[#888]' : 'text-[#666]';

  el.innerHTML = `
    <div class="page space-y-3 pt-3">
      <h2 class="font-display text-xl font-bold ${textMain} uppercase tracking-wide">Training History</h2>
      <p class="text-xs ${textMuted}">${sessions.length} total sessions</p>

      ${sessions.length === 0 ? `
        <div class="text-center py-12">
          <p class="text-3xl mb-2">🏋️</p>
          <p class="${textMuted} text-sm">No sessions yet. Start your first workout!</p>
        </div>
      ` : ''}

      <div class="space-y-2">
        ${sessions.map(s => {
          const wSets = s.exercises.reduce((n, e) => n + (e.skipped ? 0 : e.sets.filter(st => st.type === 'working').length), 0);
          return `
            <div class="card-touch card-accent ${cardBg} border rounded-xl p-4 cursor-pointer" onclick="navigate('/history/${s.id}')">
              <div class="flex items-center justify-between">
                <div>
                  <p class="text-[15px] font-semibold ${textMain}">${s.planDayName}</p>
                  <div class="flex items-center gap-3 mt-1">
                    <span class="text-xs ${textMuted}">${formatDate(s.date)}</span>
                    <span class="text-xs ${textMuted}">${s.duration} min</span>
                    <span class="font-mono text-xs text-crimson font-semibold">${wSets} sets</span>
                  </div>
                </div>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${isDark ? '#666' : '#999'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

// ============================================================
// SESSION DETAIL PAGE
// ============================================================

function renderSessionDetail(el, id) {
  const sessions = getSessions();
  const session = sessions.find(s => s.id === id);
  const cardBg = isDark ? 'bg-[#141414] border-[#222]' : 'bg-white border-[#e5e5e5]';
  const textMain = isDark ? 'text-white' : 'text-[#1a1a1a]';
  const textMuted = isDark ? 'text-[#888]' : 'text-[#666]';

  if (!session) {
    el.innerHTML = `<div class="page text-center py-20"><p class="${textMuted}">Session not found</p></div>`;
    return;
  }

  el.innerHTML = `
    <div class="page space-y-3 pt-2">
      <!-- Back -->
      <button onclick="navigate('/history')" class="flex items-center gap-1 text-crimson text-sm font-medium min-h-[44px]">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        History
      </button>

      <!-- Header -->
      <div>
        <h2 class="font-display text-xl font-bold ${textMain} uppercase tracking-wide">${session.planDayName}</h2>
        <div class="flex items-center gap-3 mt-1">
          <span class="text-sm ${textMuted}">${formatDate(session.date)}</span>
          <span class="text-sm ${textMuted}">${session.duration} min</span>
        </div>
      </div>

      ${session.notes ? `<p class="text-sm ${textMuted} italic">${session.notes}</p>` : ''}

      <!-- Exercises -->
      <div class="space-y-3">
        ${session.exercises.map(ex => {
          const warmups = ex.sets ? ex.sets.filter(s => s.type === 'warmup') : [];
          const working = ex.sets ? ex.sets.filter(s => s.type === 'working') : [];

          return `
            <div class="card-accent ${cardBg} border rounded-xl p-4">
              <div class="flex items-center justify-between mb-2">
                <h3 class="text-sm font-bold ${textMain}">${getExerciseName(ex.exerciseId)}</h3>
                ${ex.skipped ? '<span class="text-[10px] bg-yellow-600/20 text-yellow-500 px-2 py-0.5 rounded-full font-bold">SKIPPED</span>' : ''}
              </div>

              ${!ex.skipped ? `
                ${warmups.length > 0 ? `
                  <div class="mb-2">
                    <p class="text-[10px] ${textMuted} uppercase tracking-wider font-display mb-1">Warmup</p>
                    ${warmups.map(s => `
                      <p class="font-mono text-xs ${textMuted}">${formatWeight(s)} × ${s.reps}</p>
                    `).join('')}
                  </div>
                ` : ''}
                ${working.length > 0 ? `
                  <div>
                    <p class="text-[10px] text-crimson uppercase tracking-wider font-display font-semibold mb-1">Working Set</p>
                    ${working.map(s => `
                      <p class="font-mono text-sm font-bold ${textMain}">${formatWeight(s)} × ${s.reps} <span class="text-[10px] ${textMuted} font-normal">to failure</span></p>
                    `).join('')}
                  </div>
                ` : ''}
              ` : `
                <p class="text-xs ${textMuted}">Exercise was skipped this session</p>
              `}
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function renderPlan(el) {
  const plan = getPlan();
  const cardBg = isDark ? 'bg-[#141414] border-[#222]' : 'bg-white border-[#e5e5e5]';
  const textMain = isDark ? 'text-white' : 'text-[#1a1a1a]';
  const textMuted = isDark ? 'text-[#888]' : 'text-[#666]';

  el.innerHTML = `
    <div class="page space-y-3 pt-3">
      <h2 class="font-display text-xl font-bold ${textMain} uppercase tracking-wide">4-Day Training Plan</h2>
      <p class="text-xs ${textMuted}">Dorian Yates Blood & Guts — HIT Protocol</p>

      <div class="space-y-3">
        ${plan.map(day => `
          <div class="${cardBg} border rounded-xl overflow-hidden">
            <button onclick="togglePlanDay('plan-${day.id}')" class="day-bar w-full flex items-center justify-between text-left min-h-[48px]">
              <span>DAY ${day.day}: ${day.name.toUpperCase()}</span>
              <div class="flex items-center gap-3">
                <span class="text-[10px] font-normal tracking-normal opacity-60">${day.exercises.length} exercises</span>
                <svg id="chevron-plan-${day.id}" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transition-transform"><polyline points="6 9 12 15 18 9"/></svg>
              </div>
            </button>

            <div id="plan-${day.id}" class="hidden border-t ${isDark ? 'border-[#222]' : 'border-[#e5e5e5]'}">
              ${day.exercises.map((ex, i) => `
                <div class="p-3 ${i > 0 ? 'border-t ' + (isDark ? 'border-[#1a1a1a]' : 'border-[#f0f0f0]') : ''}">
                  <div class="flex items-center justify-between mb-1">
                    <p class="text-sm font-semibold ${textMain}">${getExerciseName(ex.exerciseId)}</p>
                    <span class="font-mono text-[11px] text-crimson font-semibold">${ex.repRange[0]}-${ex.repRange[1]} reps</span>
                  </div>
                  <div class="flex items-center gap-3 text-[11px] ${textMuted}">
                    <span>${ex.warmupSets} warmup${ex.warmupSets !== 1 ? 's' : ''}</span>
                    <span>${ex.workingSets} working</span>
                    <span>Rest ${ex.rest}s</span>
                  </div>
                  ${ex.notes ? `<p class="text-[11px] ${textMuted} italic mt-1">${ex.notes}</p>` : ''}
                </div>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function togglePlanDay(id) {
  const el = document.getElementById(id);
  const chevron = document.getElementById('chevron-' + id);
  if (el) {
    el.classList.toggle('hidden');
    if (chevron) {
      chevron.style.transform = el.classList.contains('hidden') ? '' : 'rotate(180deg)';
    }
  }
}
